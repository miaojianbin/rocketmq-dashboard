name: Build Release Jar

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the jar to
        required: true
        default: v2.1.1-contextpath-20260408
      ref:
        description: Git ref to build
        required: true
        default: master

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build jar
        env:
          CI: "false"
        run: mvn -B -DskipTests package

      - name: Find jar
        id: find_jar
        shell: bash
        run: |
          JAR_PATH="$(find target -maxdepth 1 -type f -name 'rocketmq-dashboard-*.jar' ! -name '*.original' | head -n 1)"
          if [ -z "$JAR_PATH" ]; then
            echo "Jar file not found"
            exit 1
          fi
          echo "jar_path=$JAR_PATH" >> "$GITHUB_OUTPUT"
          echo "jar_name=$(basename "$JAR_PATH")" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.find_jar.outputs.jar_name }}
          path: ${{ steps.find_jar.outputs.jar_path }}

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ inputs.tag }}" "${{ steps.find_jar.outputs.jar_path }}" --repo "${{ github.repository }}" --clobber
